<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>20,000 DeepSeek Subjects Generator</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b1120;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #0f172a;
      border-radius: 32px;
      padding: 24px 20px 32px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      border: 1px solid #1e2a4a;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4d9bf5;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.45;
      margin: 0 0 20px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      border: none;
      border-radius: 60px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      background: #1e40af;
      color: white;
      width: 100%;
    }
    button:active {
      transform: scale(0.97);
      background: #1e3a8a;
    }
    button:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }
    .copy-btn {
      background: #0d9488;
    }
    .copy-btn:active {
      background: #0f766e;
    }
    .progress {
      background: #1e293b;
      border-radius: 40px;
      height: 8px;
      margin: 12px 0 16px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: #4d9bf5;
      transition: width 0.1s linear;
    }
    .status {
      background: #1e293b;
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 13px;
      text-align: center;
      color: #cbd5e1;
      word-break: break-word;
    }
    footer {
      text-align: center;
      font-size: 11px;
      color: #475569;
      margin-top: 20px;
    }
    @media (max-width: 480px) {
      .card { padding: 18px; }
      h1 { font-size: 22px; }
      button { padding: 12px 16px; font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔵 20,000 DeepSeek Subjects</h1>
  <p>Generate 20,000 unique conversation topics for DeepSeek AI (English). Works offline on your phone — download as .txt or copy to clipboard.</p>

  <div class="btn-group">
    <button id="downloadBtn">✨ Download .txt (DeepSeek, 20k lines)</button>
    <button id="copyBtn" class="copy-btn">📋 Copy to clipboard</button>
  </div>

  <div class="progress" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="statusMsg">Ready. Tap a button.</div>
  <footer>No internet required · pure HTML/JS · ~2MB text · DeepSeek style</footer>
</div>

<script>
  (function() {
    // Same 20,000 subjects structure (DeepSeek branded)
    const categories = ["Technology","Science","Business","Health","Education","Finance","Travel","Food","Gaming","AI"];
    const actions = ["Explain","Compare","List","Solve","Create","Analyze","Recommend","Write","Debug","Discuss"];
    const topics = ["Python","Climate change","Stock market","Diabetes","Resume","Bitcoin","Paris","Pizza recipe","JavaScript","ChatGPT"];
    const modifiers = ["for beginners","step by step","with examples","in simple terms","for interview","2025 outlook","budget friendly","healthy version","common errors","ethical concerns"];

    const TOTAL_EXPECTED = 20000;
    let generatedSubjects = null;
    let isGenerating = false;

    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const statusDiv = document.getElementById('statusMsg');

    function setProgress(percent) {
      const p = Math.min(100, Math.max(0, percent));
      progressBar.style.width = p + '%';
    }

    async function* generateLinesChunked(chunkSize = 800) {
      let patternIdx = 0;
      let iCat = 0, iAct = 0, iTop = 0, iMod = 0;
      let totalProduced = 0;
      const patterns = [
        (cat, act, top, mod) => `${act} ${top} ${mod} (${cat})`,
        (cat, act, top, mod) => `How to ${act.toLowerCase()} ${top} ${mod}? (${cat})`
      ];

      while (totalProduced < TOTAL_EXPECTED) {
        const chunk = [];
        while (chunk.length < chunkSize && totalProduced < TOTAL_EXPECTED) {
          const cat = categories[iCat];
          const act = actions[iAct];
          const top = topics[iTop];
          const mod = modifiers[iMod];
          chunk.push(patterns[patternIdx](cat, act, top, mod));

          iMod++;
          if (iMod >= modifiers.length) { iMod = 0; iTop++; }
          if (iTop >= topics.length) { iTop = 0; iAct++; }
          if (iAct >= actions.length) { iAct = 0; iCat++; }
          if (iCat >= categories.length) {
            iCat = 0;
            patternIdx++;
          }
          totalProduced++;
        }
        yield chunk;
        await new Promise(r => setTimeout(r, 0));
      }
    }

    async function generateFullText() {
      const chunks = [];
      let total = 0;
      const generator = generateLinesChunked(1000);
      for await (const chunk of generator) {
        chunks.push(chunk.join('\n'));
        total += chunk.length;
        const percent = (total / TOTAL_EXPECTED) * 100;
        setProgress(percent);
        statusDiv.innerText = `⏳ Generating ${total.toLocaleString()} / ${TOTAL_EXPECTED.toLocaleString()} subjects...`;
      }
      return chunks.join('\n');
    }

    async function getOrGenerateSubjects() {
      if (generatedSubjects !== null) return generatedSubjects;
      if (isGenerating) {
        statusDiv.innerText = '⏳ Already generating, please wait...';
        return null;
      }
      isGenerating = true;
      progressWrap.style.display = 'block';
      setProgress(0);
      statusDiv.innerText = '⏳ Generating 20,000 subjects for DeepSeek... (2-3 seconds)';
      downloadBtn.disabled = true;
      copyBtn.disabled = true;

      try {
        const fullText = await generateFullText();
        generatedSubjects = fullText;
        setProgress(100);
        statusDiv.innerText = `✅ Ready! ${TOTAL_EXPECTED.toLocaleString()} DeepSeek subjects generated.`;
        return fullText;
      } catch (err) {
        console.error(err);
        statusDiv.innerText = '❌ Generation error. Refresh and try again.';
        return null;
      } finally {
        isGenerating = false;
        downloadBtn.disabled = false;
        copyBtn.disabled = false;
        setTimeout(() => {
          if (statusDiv.innerText.includes('Ready') || statusDiv.innerText.includes('✅')) {
            progressWrap.style.display = 'none';
            setProgress(0);
          }
        }, 1500);
      }
    }

    async function handleDownload() {
      const text = await getOrGenerateSubjects();
      if (!text) return;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'deepseek_20000_subjects.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      statusDiv.innerText = `✅ Downloaded ${TOTAL_EXPECTED.toLocaleString()} DeepSeek subjects.`;
      setTimeout(() => {
        if (statusDiv.innerText.includes('Downloaded')) {
          statusDiv.innerText = `✅ Ready! ${TOTAL_EXPECTED.toLocaleString()} subjects available.`;
        }
      }, 2000);
    }

    async function handleCopy() {
      const text = await getOrGenerateSubjects();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        statusDiv.innerText = `📋 Copied ${TOTAL_EXPECTED.toLocaleString()} DeepSeek subjects to clipboard!`;
      } catch (e) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const success = document.execCommand('copy');
        textarea.remove();
        if (success) {
          statusDiv.innerText = `📋 Copied ${TOTAL_EXPECTED.toLocaleString()} subjects (fallback).`;
        } else {
          statusDiv.innerText = `❌ Copy failed. Try download instead.`;
        }
      }
      setTimeout(() => {
        if (statusDiv.innerText.includes('Copied')) {
          statusDiv.innerText = `✅ Ready! ${TOTAL_EXPECTED.toLocaleString()} DeepSeek subjects ready.`;
        }
      }, 2000);
    }

    downloadBtn.addEventListener('click', handleDownload);
    copyBtn.addEventListener('click', handleCopy);
  })();
</script>
</body>
</html>
